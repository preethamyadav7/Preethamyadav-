<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aria — AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e5e2da;
      --text: #1a1916;
      --muted: #8a8780;
      --accent: #2a6049;
      --accent-light: #e8f0ec;
      --user-bubble: #1a1916;
      --user-text: #f7f6f2;
      --ai-bubble: #ffffff;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: 0 1px 0 var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 18px; height: 18px; fill: white; }

    .logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
      background: var(--accent-light);
      padding: 5px 12px;
      border-radius: 100px;
    }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex;
      gap: 12px;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.ai {
      background: var(--accent);
      color: white;
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
    }

    .avatar.user {
      background: var(--user-bubble);
      color: var(--user-text);
      font-size: 0.8rem;
    }

    .bubble {
      padding: 13px 17px;
      border-radius: 16px;
      font-size: 0.93rem;
      line-height: 1.65;
      max-width: calc(100% - 50px);
      box-shadow: var(--shadow);
    }

    .message-row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .message-row.user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-top-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex; align-items: center; gap: 4px;
      padding: 14px 18px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* Welcome screen */
    #welcome {
      max-width: 560px;
      margin: auto;
      text-align: center;
      padding: 20px;
    }

    .welcome-icon {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }

    .welcome-icon svg { width: 32px; height: 32px; fill: white; }

    #welcome h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.1rem;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      line-height: 1.15;
    }

    #welcome h1 em {
      font-style: italic;
      color: var(--accent);
    }

    #welcome p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 15px;
      text-align: left;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      transition: all 0.18s;
      line-height: 1.4;
    }

    .suggestion:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .suggestion .s-icon { font-size: 1.1rem; margin-bottom: 5px; display: block; }
    .suggestion .s-text { font-weight: 500; }
    .suggestion .s-sub { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

    /* Input area */
    #input-area {
      padding: 16px 24px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(42,96,73,0.08);
    }

    #user-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      color: var(--text);
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 24px;
      line-height: 1.5;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s;
    }

    #send-btn:hover { background: #1e4d39; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
    #send-btn svg { width: 16px; height: 16px; fill: white; }

    .input-footer {
      max-width: 780px;
      margin: 8px auto 0;
      text-align: center;
      font-size: 0.73rem;
      color: var(--muted);
    }

    /* API key banner */
    #api-banner {
      background: #fffbeb;
      border-bottom: 1px solid #fde68a;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    #api-banner span { color: #92400e; }

    #api-banner input {
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 5px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      width: 260px;
      outline: none;
      background: white;
    }

    #api-banner input:focus { border-color: var(--accent); }

    #api-banner button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 5px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
    }

    #api-banner button:hover { background: #1e4d39; }

    @media (max-width: 600px) {
      .suggestion-grid { grid-template-columns: 1fr; }
      #welcome h1 { font-size: 1.6rem; }
      header { padding: 14px 18px; }
      #chat { padding: 20px 14px; }
      #input-area { padding: 12px 14px 16px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <span class="logo-name">Aria</span>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<!-- API Key Banner -->
<div id="api-banner">
  <span>🔑 Enter your Anthropic API key to activate:</span>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." />
  <button onclick="saveKey()">Save</button>
</div>

<!-- Chat -->
<div id="chat">
  <div id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <h1>Hello, I'm <em>Aria</em>.<br/>How can I help you?</h1>
    <p>Your intelligent assistant — ask me anything, from everyday questions to complex topics.</p>
    <div class="suggestion-grid">
      <button class="suggestion" onclick="useSuggestion(this)">
        <span class="s-icon">✍️</span>
        <div class="s-text">Write something for me</div>
        <div class="s-sub">Emails, essays, creative writing</div>
      </button>
      <button class="suggestion" onclick="useSuggestion(this)">
        <span class="s-icon">💡</span>
        <div class="s-text">Explain a concept</div>
        <div class="s-sub">Make complex ideas simple</div>
      </button>
      <button class="suggestion" onclick="useSuggestion(this)">
        <span class="s-icon">🧮</span>
        <div class="s-text">Help me solve a problem</div>
        <div class="s-sub">Logic, math, planning & more</div>
      </button>
      <button class="suggestion" onclick="useSuggestion(this)">
        <span class="s-icon">💬</span>
        <div class="s-text">Just have a conversation</div>
        <div class="s-sub">Chat freely about anything</div>
      </button>
    </div>
  </div>
</div>

<!-- Input -->
<div id="input-area">
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Message Aria…" maxlength="4000"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-footer">Aria can make mistakes. Verify important information.</div>
</div>

<script>
  let apiKey = '';
  let messages = [];
  let isLoading = false;

  const chat = document.getElementById('chat');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (val.startsWith('sk-')) {
      apiKey = val;
      document.getElementById('api-banner').style.display = 'none';
    } else {
      alert('Please enter a valid Anthropic API key (starts with sk-ant-)');
    }
  }

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function useSuggestion(el) {
    const text = el.querySelector('.s-text').textContent;
    input.value = text;
    input.focus();
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'A' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'ai' && content === '__typing__') {
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
      row.id = 'typing-row';
    } else {
      bubble.textContent = content;
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return row;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    if (!apiKey) {
      alert('Please enter your Anthropic API key in the banner above.');
      return;
    }

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    const typingRow = addMessage('ai', '__typing__');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are Aria, a helpful, friendly, and professional AI assistant. Be concise but thorough. Use clear language.',
          messages: messages
        })
      });

      const data = await res.json();
      typingRow.remove();

      if (data.content && data.content[0]) {
        const reply = data.content[0].text;
        messages.push({ role: 'assistant', content: reply });
        addMessage('ai', reply);
      } else if (data.error) {
        addMessage('ai', `Error: ${data.error.message}`);
      }
    } catch (err) {
      typingRow.remove();
      addMessage('ai', 'Something went wrong. Please check your API key and try again.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
